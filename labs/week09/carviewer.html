<html>
    <head>
        <title>View books</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    </head>
    <body>
        <h1>Books</h1>
        <div><button id="button-showCreate" onclick="showCreate()">Create</button></div>
        <div>
            <table border="1" class="table" id="bookTable">
                <tr>
                    <th>id</th>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Price</th>
                    <th>Update</th>
                    <th>Delete</th>
                </tr>
                <tr>
                    <td>1</td>
                    <td>The Light Fantastic</td>
                    <td>Terry Pratchett</td>
                    <td>12</td>
                    <td><button>Update</button></td>
                    <td><button>Delete</button></td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>The Colour of Magic</td>
                    <td>Terry Pratchett</td>
                    <td>22</td>
                    <td><button>Update</button></td>
                    <td><button>Delete</button></td>
                </tr><tr>
                    <td>2</td>
                    <td>Guards, Guards</td>
                    <td>Terry Pratchett</td>
                    <td>11</td>
                    <td><button>Update</button></td>
                    <td><button>Delete</button></td>
                </tr>
            </table>
        </div>
        <div id="createUpdateForm" style="display: none">
        <h2>
            <span id="createLabel">Create a</span>
            <span id='updateLabel' style="display: none">Update this</span> Book
        </h2>
        <div>
            id <input type="text" name="id"><br/>
            Title <input type="text" name="title"><br/>
            Author <input type="text" name="author"><br/>
            Price <input type="number" name="price"><br/>
            Just to show select <select name="status">
                <option value="instock">in stock</option>
                <option value="outstock">out of stock</option>
                <option value="other">out of print</option>
            </select><br/>
        </div>
        <span><button id="button-doCreate">Create</button></span>
        <span><button id="button-doUpdate" style="display:none">Update</button></span>
        </div>
        <script>
            function showCreate(){
                document.getElementById('button-showCreate').style.display='none'
                document.getElementById('bookTable').style.display='none'
                document.getElementById('createUpdateForm').style.display='block'
            }
        </script>
    </body>
</html>
